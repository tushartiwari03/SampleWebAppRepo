# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  vmImage: 'windows-latest'

steps:
- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '8.0.x'

- script: dotnet restore
  displayName: 'Restore dependencies'

- script: dotnet build --configuration Release
  displayName: 'Build project'

- script: dotnet test --no-build --verbosity normal
  displayName: 'Run tests'

# Publish the app to the artifact staging directory
- script: dotnet publish -c Release -o $(Build.ArtifactStagingDirectory)
  displayName: 'Publish project'

# Deploy the published folder directly (no need for ArchiveFiles)
- task: AzureWebApp@1
  inputs:
    azureSubscription: 'AzureConnection'   # your service connection name
    appName: 'samplewebapptushar'          # your App Service name
    package: '$(Build.ArtifactStagingDirectory)'